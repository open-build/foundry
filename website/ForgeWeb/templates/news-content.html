<!-- News Page Template - NullRecords -->
<section class="py-16 relative z-10">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-pixel text-cyber-blue mb-4 glow-text">News</h1>
            <p class="text-gray-400 font-mono max-w-3xl mx-auto">
                Aggregated coverage of NullRecords and My Evil Robot Army from Bandcamp, Last.fm, SoundCloud, and more.
            </p>
        </div>

        <!-- Filter bar -->
        <div class="flex flex-wrap gap-3 justify-center mb-10">
            <button class="news-filter active font-mono text-sm px-4 py-2 rounded-lg border border-dark-border bg-dark-card text-cyber-blue" data-source="all">All</button>
            <button class="news-filter font-mono text-sm px-4 py-2 rounded-lg border border-dark-border bg-dark-card text-gray-400" data-source="bandcamp">Bandcamp</button>
            <button class="news-filter font-mono text-sm px-4 py-2 rounded-lg border border-dark-border bg-dark-card text-gray-400" data-source="lastfm">Last.fm</button>
            <button class="news-filter font-mono text-sm px-4 py-2 rounded-lg border border-dark-border bg-dark-card text-gray-400" data-source="soundcloud">SoundCloud</button>
        </div>

        <!-- News articles loaded from news_articles.json -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {{NEWS_ARTICLES}}
        </div>
    </div>
</section>
