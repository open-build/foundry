name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Prepare publish docs folder
      run: |
        set -euo pipefail
        rm -rf docs
        mkdir -p docs

        # ForgeWeb output is expected in website/docs for this repository.
        if [ -f website/docs/index.html ]; then
          cp -R website/docs/. docs/
        elif [ -f website/index.html ]; then
          cp -R website/. docs/
        else
          echo "No deployable site found in website/docs or website"
          exit 1
        fi

    - name: Validate published pages
      run: |
        set -euo pipefail
        test -f docs/index.html || (echo "Missing docs/index.html" && exit 1)
        test -f docs/register.html || (echo "Missing docs/register.html" && exit 1)
        test -f docs/pages/about.html || (echo "Missing docs/pages/about.html" && exit 1)
        test -f docs/pages/index-report.html || (echo "Missing docs/pages/index-report.html" && exit 1)
        test -f docs/404.html || (echo "Missing docs/404.html" && exit 1)
        test -f docs/CNAME || (echo "Missing docs/CNAME" && exit 1)
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
